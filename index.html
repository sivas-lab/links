<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sivaldo Davi | Portal</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #ededed;
            --accent-color: #ffffff;
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: -1px;
            margin-bottom: 2rem;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        a {
            display: block;
            padding: 15px;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        a:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Sivaldo Davi</h1>
        
        <div class="links">
            <a href="https://sivaldodavi.com">Principal</a>
            <a href="https://dir.sivaldodavi.com">Direito</a>
            <a href="https://cv.sivaldodavi.com">Currículo</a>
        </div>

        <footer>© 2026 Sivaldo Davi</footer>
    </div>

</body>
</html>
